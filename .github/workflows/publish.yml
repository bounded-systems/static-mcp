name: publish

# Publish @bounded-systems/static-mcp to JSR and npm using KEYLESS OIDC.
#
# No tokens are stored in this repo:
#   - JSR: `deno publish` mints a short-lived GitHub Actions OIDC token JSR trusts
#     (link the repo once at jsr.io/@bounded-systems/static-mcp → Settings).
#   - npm: trusted publishing exchanges the OIDC token for publish auth and
#     attaches build provenance (link the repo + workflow once on npmjs.com).
#
# Triggered only by a `v*` tag (or manual dispatch). Never publishes on push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # REQUIRED: lets both jobs mint the OIDC token the registries trust

jobs:
  jsr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x
      - name: Publish to JSR (keyless OIDC)
        run: deno publish

  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # npm trusted publishing needs npm >= 11.5.
      - name: Ensure npm >= 11.5
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public
